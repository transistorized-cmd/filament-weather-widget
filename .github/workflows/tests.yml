name: tests

on:
  push:
    branches: [main, 1.x, 2.x]
  pull_request:
    branches: [main, 1.x, 2.x]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        filament: ['^4.0', '^5.0']
        include:
          - laravel: '11.*'
            testbench: '^9.0'
          - laravel: '12.*'
            testbench: '^10.0'
          - laravel: '13.*'
            testbench: '^11.0'
        exclude:
          # Laravel 13 requires PHP >= 8.3
          - laravel: '13.*'
            php: '8.2'

    name: PHP ${{ matrix.php }} - L ${{ matrix.laravel }} - F ${{ matrix.filament }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, intl
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "filament/filament:${{ matrix.filament }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
